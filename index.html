
<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optima Control HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/montserrat@5/cyrillic.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/pt-sans@5/cyrillic.css" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['PT Sans', 'sans-serif'],
              headline: ['Montserrat', 'sans-serif'],
              mono: ['monospace'],
            },
            colors: {
              primary: {
                DEFAULT: '#E63946',
                dark: '#B71C2A',
                lite: '#FF4F5C',
              },
              red: {
                DEFAULT: '#E63946',
                dark: '#B71C2A',
                lite: '#FF4F5C',
              }
            },
            animation: {
              'fade-slide-up': 'fadeSlideUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both',
              'spin-slow': 'spin 3s linear infinite',
              'shimmer': 'shimmer 1.5s linear infinite',
              'ripple': 'rippleAnim 0.7s ease-out forwards',
              'shake': 'shake 0.3s ease',
              'pulse-dot': 'pulseDot 1.5s ease-out infinite',
            },
            keyframes: {
              fadeSlideUp: {
                'from': { opacity: '0', transform: 'translateY(28px)' },
                'to': { opacity: '1', transform: 'translateY(0)' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%) skewX(-20deg)' },
                '100%': { transform: 'translateX(150%) skewX(-20deg)' },
              },
              rippleAnim: {
                'to': { width: '240px', height: '240px', opacity: '0' },
              },
              shake: {
                '25%': { transform: 'translateX(-4px)' },
                '75%': { transform: 'translateX(4px)' },
              },
              pulseDot: {
                '0%': { transform: 'scale(0.3)', opacity: '0.9' },
                '100%': { transform: 'scale(1.3)', opacity: '0' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Night mode (default) */
        --bg: #080808;
        --surface: #101010;
        --surface2: #181818;
        --surface3: #222222;
        --border: #2c2c2c;
        --border2: #3a3a3a;
        --red: #E63946;
        --red-dark: #B71C2A;
        --red-lite: #FF4F5C;
        --text: #F0F0F0;
        --text2: #C8C8C8;
        --muted: #5A5A5A;
        --muted2: #888888;
      }

      [data-theme="light"] {
        --bg: #E4E4E4;
        --surface: #F5F5F5;
        --surface2: #ECECEC;
        --surface3: #E0E0E0;
        --border: #D0D0D0;
        --border2: #BBBBBB;
        --text: #131313;
        --text2: #333333;
        --muted: #777777;
        --muted2: #999999;
      }

      * {
        transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg);
        color: var(--text);
        font-family: 'PT Sans', sans-serif;
        line-height: 1.7;
        font-size: 15px;
        overflow: hidden;
        cursor: none !important;
      }

      /* Background Grid */
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image: 
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.5;
        z-index: -1;
        pointer-events: none;
      }

      /* Decorative SVG Figures */
      .geo-decor {
        position: fixed;
        pointer-events: none;
        z-index: -1;
        opacity: 0.06;
        stroke: var(--red);
        fill: none;
      }

      /* Custom Cursor */
      #cursor-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--red);
        position: fixed; z-index: 9999; pointer-events: none;
        transition: width 0.15s, height 0.15s, background 0.18s, opacity 0.2s;
        transform: translate(-50%, -50%);
      }
      #cursor-ring {
        width: 36px; height: 36px; border-radius: 50%;
        border: 1.5px solid var(--red);
        position: fixed; z-index: 9998; pointer-events: none;
        transition: width 0.28s cubic-bezier(0.22,1,0.36,1),
                    height 0.28s cubic-bezier(0.22,1,0.36,1),
                    border-color 0.25s, background 0.25s, opacity 0.2s;
        transform: translate(-50%, -50%);
      }

      /* Cursor States */
      body.cursor-hover #cursor-dot { width: 5px; height: 5px; background: #fff; }
      body.cursor-hover #cursor-ring { 
        width: 52px; height: 52px; 
        background: rgba(230,57,70,0.12); 
        border-color: var(--red-lite); 
      }
      body.cursor-click #cursor-dot { background: #fff; }
      body.cursor-click #cursor-ring { width: 60px; height: 60px; opacity: 0.35; border-width: 2px; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 2.5px;
      }
      ::-webkit-scrollbar-thumb:hover { background: var(--red); }

      #root {
        width: 153.846vw;
        height: 153.846vh;
        transform: scale(0.65);
        transform-origin: top left;
        position: relative;
        z-index: 1;
      }

      /* Typography */
      h1, h2, h3, h4, h5, h6, .font-headline {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      /* Buttons */
      .btn-primary {
        background: linear-gradient(135deg, var(--red-dark) 0%, var(--red) 55%, var(--red-lite) 100%);
        background-size: 200% 100%;
        background-position: 100% 0;
        color: #fff;
        border: none;
        border-radius: 7px;
        padding: 13px 28px;
        font-family: 'Montserrat', sans-serif;
        font-size: 13.5px;
        font-weight: 700;
        letter-spacing: 0.5px;
        box-shadow: 0 4px 24px rgba(230,57,70,0.28), inset 0 1px 0 rgba(255,255,255,0.18), inset 0 -2px 0 rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.06);
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-primary:hover {
        background-position: 0% 0;
        transform: translateY(-3px) scale(1.025);
        box-shadow: 0 8px 40px rgba(230,57,70,0.55), 0 0 0 1.5px var(--red-lite), inset 0 1px 0 rgba(255,255,255,0.22);
      }
      .btn-primary::before {
        content: '';
        position: absolute;
        top: 0; left: -100%; width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
        transform: skewX(-20deg);
        transition: none;
      }
      .btn-primary:hover::before {
        animation: shimmer 0.55s ease-out forwards;
      }
      .btn-primary:active {
        transform: translateY(0) scale(0.965);
        box-shadow: 0 2px 10px rgba(230,57,70,0.28);
      }

      .btn-secondary {
        background: transparent;
        color: var(--text);
        border: 1.5px solid var(--border2);
        border-radius: 7px;
        padding: 12px 26px;
        font-family: 'Montserrat', sans-serif;
        font-size: 13.5px;
        font-weight: 700;
        transition: all 0.38s cubic-bezier(0.22,1,0.36,1);
        position: relative;
        z-index: 1;
      }
      .btn-secondary:hover {
        color: var(--red);
        border-color: var(--red);
        box-shadow: 0 0 0 3px rgba(230,57,70,0.08), inset 0 0 16px rgba(230,57,70,0.06);
        transform: translateY(-2px);
      }

      /* Cards */
      .premium-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 24px;
        position: relative;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      }
      .premium-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 2px;
        background: var(--red);
        border-radius: 10px 10px 0 0;
        opacity: 0.8;
      }
      .premium-card:hover {
        transform: translateY(-6px) scale(1.012);
        border-color: rgba(230,57,70,0.35);
        box-shadow: 0 16px 48px rgba(0,0,0,0.65), 0 0 40px rgba(230,57,70,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
      }
      .card-number {
        position: absolute;
        top: 12px; right: 14px;
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 32px;
        color: rgba(230,57,70,0.07);
        pointer-events: none;
      }

      /* Reveal Animation */
      .reveal {
        opacity: 0;
      }
      .reveal.active {
        animation: fadeSlideUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Preloader */
      #preloader {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease;
      }
      .preloader-bar {
        width: 200px;
        height: 4px;
        background: var(--surface3);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 20px;
      }
      .preloader-progress {
        height: 100%;
        background: linear-gradient(90deg, var(--red-dark), var(--red), var(--red-lite));
        width: 0%;
        transition: width 0.3s ease;
      }

      /* Ripple Effect */
      .ripple {
        position: absolute;
        width: 0; height: 0;
        border-radius: 50%;
        background: rgba(255,255,255,0.32);
        transform: translate(-50%,-50%);
        pointer-events: none;
      }

      .word-content img { max-width: 100%; height: auto; border-radius: 1rem; margin: 1.5rem 0; }
      .word-content table { border-collapse: collapse; width: 100%; margin: 1.5rem 0; }
      .word-content td, .word-content th { border: 1px solid #e5e7eb; padding: 0.75rem; }
      .word-content p { margin-bottom: 1rem; line-height: 1.6; }
      .word-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
      .word-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }

      @keyframes spin-glow {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
      }
      .animate-spin-glow {
        animation: spin-glow 3s linear infinite;
      }

      .reveal {
        opacity: 1;
      }
      .reveal.active {
        animation: fadeSlideUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Clay & Glass Effects */
      .clay-panel {
        background: var(--surface2);
        border-radius: 24px;
        box-shadow: inset 4px 4px 8px rgba(0,0,0,0.4), inset -4px -4px 8px rgba(255,255,255,0.03);
        border: 1px solid var(--border);
      }
      .clay-btn {
        background: var(--surface3);
        box-shadow: 4px 4px 8px rgba(0,0,0,0.4), -2px -2px 6px rgba(255,255,255,0.03), inset 2px 2px 4px rgba(255,255,255,0.03);
        border: 1px solid var(--border2);
      }
      .clay-btn:active {
        box-shadow: inset 4px 4px 8px rgba(0,0,0,0.4), inset -2px -2px 6px rgba(255,255,255,0.03);
      }
      .glass-panel {
        background: var(--surface2);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      }
      [data-theme="light"] .glass-panel {
        background: var(--surface);
        border-color: var(--border);
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      }

      /* Additional Animations */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
      .animate-scale-in { animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

      .input-3d {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
        transition: all 0.3s ease;
      }
      .input-3d:focus {
        border-color: var(--red);
        box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3), 0 0 15px rgba(230,57,70,0.1);
      }
      .btn-3d {
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        border-radius: 12px;
      }
      .btn-3d:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      }
      .btn-3d:active {
        transform: translateY(0);
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.474.0?external=react",
    "recharts": "https://esm.sh/recharts@3.4.1?external=react,react-dom",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
    "xlsx": "https://esm.sh/xlsx@0.18.5",
    "jszip": "https://esm.sh/jszip@3.10.1",
    "mammoth": "https://esm.sh/mammoth@1.6.0",
    "pptxgenjs": "https://esm.sh/pptxgenjs@3.12.0",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@3.8.2",
    "motion/react": "https://esm.sh/motion@12.4.7/react?external=react,react-dom",
    "clsx": "https://esm.sh/clsx@2.1.1",
    "tailwind-merge": "https://esm.sh/tailwind-merge@2.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
</head>
  <body>
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    <div id="preloader">
      <div class="font-headline text-red font-black text-2xl tracking-tighter">OPTIMA HUB</div>
      <div class="preloader-bar">
        <div id="preloader-progress" class="preloader-progress"></div>
      </div>
    </div>
    <div class="bg-grid"></div>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
